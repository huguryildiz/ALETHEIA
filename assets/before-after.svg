<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 720" width="1240" height="720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Line chart: for a UAV at 100 m, the correct 3GPP TR 36.777 UMa-AV line-of-sight probability stays high with distance, but an AI model that mixed in UMi-AV parameters collapses it — at 1 km, 0.85 versus 0.25, a 10 dB error. Aletheia's correctness-gate holds the claim until every coefficient traces to one scenario.">
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C1424"/><stop offset="1" stop-color="#090F1B"/>
    </linearGradient>
    <linearGradient id="errFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EF5F5F" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#EF5F5F" stop-opacity="0.03"/>
    </linearGradient>
    <radialGradient id="sealGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C9A24B" stop-opacity="0.28"/><stop offset="1" stop-color="#C9A24B" stop-opacity="0"/>
    </radialGradient>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', 'Iowan Old Style', serif; }
      .mono  { font-family: 'SF Mono', 'Menlo', 'Consolas', 'Liberation Mono', monospace; }
    </style>
  </defs>

  <rect width="1240" height="720" fill="url(#ground)"/>
  <rect x="0.5" y="0.5" width="1239" height="719" fill="none" stroke="#C9A24B" stroke-opacity="0.16"/>

  <!-- Header -->
  <text x="64" y="58" class="serif" font-size="22" letter-spacing="6" fill="#E7ECF3">ALETHEIA</text>
  <text x="64" y="82" class="mono" font-size="11" letter-spacing="1.5" fill="#7C8AA0">ἀλήθεια — disclosure: the state of not being hidden</text>
  <text x="1176" y="58" text-anchor="end" class="serif" font-size="18" fill="#E7ECF3">When an AI mixes two 3GPP scenarios, line-of-sight quietly collapses</text>
  <text x="1176" y="82" text-anchor="end" class="mono" font-size="11" letter-spacing="1" fill="#C9A24B" fill-opacity="0.8">real model · TR 36.777 · UMa UAV @ 100 m · every constant a valid 3GPP value</text>

  <!-- ===================== PLOT ===================== -->
  <!-- gridlines P = 0,.25,.5,.75,1 -> y 490,415,340,265,190 -->
  <g stroke="#FFFFFF" stroke-opacity="0.06">
    <line x1="110" y1="190" x2="1130" y2="190"/><line x1="110" y1="265" x2="1130" y2="265"/>
    <line x1="110" y1="340" x2="1130" y2="340"/><line x1="110" y1="415" x2="1130" y2="415"/>
  </g>
  <line x1="110" y1="490" x2="1130" y2="490" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <!-- y ticks -->
  <g class="mono" font-size="11" fill="#7C8AA0" text-anchor="end">
    <text x="96" y="194">1.0</text><text x="96" y="269">0.75</text><text x="96" y="344">0.50</text><text x="96" y="419">0.25</text><text x="96" y="494">0</text>
  </g>
  <text x="40" y="340" class="mono" font-size="12" fill="#9AA6B6" letter-spacing="1.5" transform="rotate(-90 40 340)" text-anchor="middle">LoS probability</text>
  <!-- x ticks -->
  <g class="mono" font-size="11" fill="#7C8AA0" text-anchor="middle">
    <text x="110" y="510">0</text><text x="365" y="510">1 km</text><text x="620" y="510">2</text><text x="875" y="510">3</text><text x="1130" y="510">4</text>
  </g>
  <text x="620" y="535" class="mono" font-size="11.5" fill="#9AA6B6" letter-spacing="1.5" text-anchor="middle">2D distance from base station</text>

  <!-- divergence band = the silent error -->
  <polygon fill="url(#errFill)" points="122.8,190 161,190 199.3,197.8 237.5,206.5 275.8,215.2 314,223.3 352.3,231.4 390.5,239.2 428.8,246.7 467,253.9 505.3,261.1 543.5,268 581.8,274.6 620,280.9 658.3,287.2 696.5,293.2 734.8,299.2 773,304.9 811.3,310.3 849.5,315.7 887.8,320.8 926,325.9 964.3,330.7 1002.5,335.5 1040.8,340 1079,344.5 1117.3,349 1117.3,478.3 1079,477.7 1040.8,477.1 1002.5,476.5 964.3,475.9 926,475.3 887.8,474.4 849.5,473.5 811.3,472.3 773,471.1 734.8,469.6 696.5,467.8 658.3,465.7 620,463 581.8,459.7 543.5,455.5 505.3,450.1 467,443.5 428.8,434.8 390.5,423.1 352.3,408.1 314,388.3 275.8,361.6 237.5,325.9 199.3,278.2 161,213.4 122.8,190"/>

  <!-- UMi (AI's wrong scenario): dashed red -->
  <polyline fill="none" stroke="#EF5F5F" stroke-width="2.5" stroke-dasharray="7 5" stroke-linecap="round" stroke-linejoin="round"
    points="122.8,190 161,213.4 199.3,278.2 237.5,325.9 275.8,361.6 314,388.3 352.3,408.1 390.5,423.1 428.8,434.8 467,443.5 505.3,450.1 543.5,455.5 581.8,459.7 620,463 658.3,465.7 696.5,467.8 734.8,469.6 773,471.1 811.3,472.3 849.5,473.5 887.8,474.4 926,475.3 964.3,475.9 1002.5,476.5 1040.8,477.1 1079,477.7 1117.3,478.3"/>
  <!-- UMa (correct): solid green -->
  <polyline fill="none" stroke="#4FD1A0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="122.8,190 161,190 199.3,197.8 237.5,206.5 275.8,215.2 314,223.3 352.3,231.4 390.5,239.2 428.8,246.7 467,253.9 505.3,261.1 543.5,268 581.8,274.6 620,280.9 658.3,287.2 696.5,293.2 734.8,299.2 773,304.9 811.3,310.3 849.5,315.7 887.8,320.8 926,325.9 964.3,330.7 1002.5,335.5 1040.8,340 1079,344.5 1117.3,349"/>

  <!-- callout at 1 km: 0.85 vs 0.25 -->
  <line x1="365" y1="235" x2="365" y2="415" stroke="#C9A24B" stroke-opacity="0.55" stroke-width="1.4" stroke-dasharray="2 5"/>
  <circle cx="365" cy="235" r="5" fill="#4FD1A0" stroke="#0C1424" stroke-width="1.5"/>
  <circle cx="365" cy="415" r="5" fill="#EF5F5F" stroke="#0C1424" stroke-width="1.5"/>
  <rect x="386" y="300" width="196" height="52" rx="8" fill="#0C1424" stroke="#C9A24B" stroke-opacity="0.4"/>
  <text x="400" y="322" class="mono" font-size="13" fill="#E7ECF3">at 1 km:  0.85 → 0.25</text>
  <text x="400" y="341" class="mono" font-size="12" fill="#EF5F5F">≈ 10 dB error · backwards</text>

  <!-- series labels (direct, with icon + line style — identity is never colour alone) -->
  <text x="740" y="252" class="mono" font-size="13" fill="#4FD1A0">✓ UMa-AV — correct scenario</text>
  <text x="740" y="272" class="mono" font-size="11" fill="#7C8AA0">stays in line of sight (right)</text>
  <text x="470" y="430" class="mono" font-size="13" fill="#EF5F5F">⛔ UMi-AV — what the AI shipped</text>
  <text x="470" y="450" class="mono" font-size="11" fill="#7C8AA0">plunges — physically wrong for a UAV</text>
  <circle cx="1117.3" cy="349" r="4.5" fill="#4FD1A0"/>
  <circle cx="1117.3" cy="478.3" r="4.5" fill="#EF5F5F"/>

  <!-- ===================== GATE + FOOTER ===================== -->
  <circle cx="150" cy="612" r="60" fill="url(#sealGlow)"/>
  <circle cx="150" cy="612" r="34" fill="#0C1424" stroke="#C9A24B" stroke-opacity="0.7" stroke-width="1.5"/>
  <circle cx="150" cy="612" r="28" fill="none" stroke="#C9A24B" stroke-opacity="0.28"/>
  <text x="150" y="608" text-anchor="middle" font-size="17" fill="#C9A24B">⊘→✓</text>
  <text x="150" y="624" text-anchor="middle" class="mono" font-size="7.5" letter-spacing="2" fill="#C9A24B" fill-opacity="0.85">GATE</text>

  <text x="232" y="592" class="serif" font-size="19" fill="#E7ECF3">Held until every coefficient names one scenario.</text>
  <text x="232" y="618" font-size="13.5" fill="#9AA6B6">Path loss said UMa-AV; LoS probability was pulled from UMi-AV — both real, both from the same</text>
  <text x="232" y="638" font-size="13.5" fill="#9AA6B6">tables, so nothing looked wrong. The <tspan class="mono" fill="#C9A24B">correctness-gate</tspan> asks which table each constant came from.</text>
  <text x="232" y="666" class="mono" font-size="11.5" fill="#7C8AA0">⛔ CLOSURE BLOCKED — scenario mismatch   →   ✔ VERIFIED once every coefficient traces to one scenario, one spec table</text>

  <line x1="64" y1="686" x2="1176" y2="686" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <text x="620" y="706" text-anchor="middle" class="serif" font-size="12.5" fill="#7C8AA0">Real run · values verified against <tspan fill="#C9A24B">3GPP TR 36.777, Tables B-1 / B-2</tspan> · not a mockup</text>
</svg>
